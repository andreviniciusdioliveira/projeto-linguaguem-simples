services:
  app:
    build: .
    container_name: entenda-aqui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - FLASK_ENV=production
      - PORT=8080
    env_file:
      - .env
    volumes:
      - ./temp:/app/temp
      - ./data:/app/data
    shm_size: '512mb'
    mem_limit: 2g
    memswap_limit: 2g
