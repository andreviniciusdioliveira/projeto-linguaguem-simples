services:
- type: web
name: simplificador-juridico
env: docker # Usa Docker em vez de runtime Python
dockerfilePath: ./Dockerfile
autoDeploy: true
plan: standard # ou "free", conforme seu plano
healthCheckPath: /health # seu endpoint de saúde
envVars:
- key: GEMINI_API_KEY
sync: false # defina no painel do Render
- key: SECRET_KEY
generateValue: true
