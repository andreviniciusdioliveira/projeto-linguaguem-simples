<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entenda aqui - Simplificador Jurídico | INOVASSOL</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='50%' x='50%' text-anchor='middle' font-size='80'>⚖️</text></svg>">
    <style>
        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --secondary: #34a853;
            --danger: #ea4335;
            --warning: #fbbc04;
            --dark: #202124;
            --light: #f8f9fa;
            --border: #dadce0;
            --shadow: rgba(0,0,0,0.1);
            --text: #202124;
            --text-muted: #5f6368;
            --success-bg: #e6f4ea;
            --error-bg: #fce8e6;
            --warning-bg: #fef7e0;
            --info-bg: #e8f0fe;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Google Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            color: var(--text);
            line-height: 1.6;
        }
        body.dark-mode {
            --primary: #4da3ff;
            --light: #1a1a1a;
            --text: #e8eaed;
            --text-muted: #9aa0a6;
            --border: #3c4043;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .header { text-align: center; margin-bottom: 3rem; }
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 8px 32px var(--shadow);
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }
        body.dark-mode .card { background: rgba(42, 42, 42, 0.95); }
        #drop-area {
            border: 2px dashed var(--primary);
            border-radius: 12px;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        #drop-area:hover { border-color: var(--primary-dark); transform: scale(1.02); }
        .button {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .button:hover { transform: translateY(-2px); }
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .loading-overlay.show { display: flex; }
        .loading-content {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            max-width: 400px;
        }
        body.dark-mode .loading-content { background: #2a2a2a; }
        .loading-spinner {
            width: 60px;
            height: 60px;
            margin: 0 auto 1rem;
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--dark);
            color: white;
            padding: 1rem 2rem;
            border-radius: 8px;
            transition: bottom 0.3s ease;
            z-index: 10000;
        }
        .toast.show { bottom: 2rem; }
        .toast.success { background: var(--secondary); }
        .toast.error { background: var(--danger); }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div id="loadingText">Processando...</div>
        </div>
    </div>

    <div class="container">
        <header class="header">
            <h1>⚖️ Entenda Aqui</h1>
            <p>Transforme documentos jurídicos em linguagem simples</p>
        </header>

        <div class="card">
            <h2 style="color: var(--primary); margin-bottom: 1.5rem;">📤 Enviar Documento</h2>
            <div id="drop-area">
                <div style="font-size: 3rem; margin-bottom: 1rem;">📁</div>
                <p>Arraste seu arquivo ou clique para selecionar</p>
                <input type="file" id="fileInput" accept=".pdf,image/*" style="display: none;">
                <button class="button" onclick="document.getElementById('fileInput').click()">
                    📎 Escolher Arquivo
                </button>
                <p style="font-size: 0.875rem; color: var(--text-muted); margin-top: 1rem;">
                    Máximo: 10MB | PDF ou Imagens
                </p>
            </div>
        </div>

        <div class="card">
            <h2 style="color: var(--primary); margin-bottom: 1.5rem;">✍️ Ou Cole o Texto</h2>
            <textarea id="manualText" placeholder="Cole o texto jurídico aqui..." 
                style="width: 100%; min-height: 150px; padding: 1rem; border: 2px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 1rem;"></textarea>
            <div style="margin-top: 1rem;">
                <button class="button" onclick="processManualText()">🔄 Simplificar Texto</button>
                <button class="button" style="background: var(--danger); margin-left: 1rem;" onclick="clearAll()">🗑️ Limpar</button>
            </div>
        </div>

        <div id="resultSection" style="display: none;">
            <div class="card">
                <h2 style="color: var(--primary); margin-bottom: 1.5rem;">✅ Resultado</h2>
                <div id="simplifiedText" style="background: var(--light); padding: 1.5rem; border-radius: 8px; max-height: 500px; overflow-y: auto;"></div>
                <div style="margin-top: 1rem;">
                    <a href="/download_pdf" class="button">📥 Baixar PDF</a>
                    <button class="button" onclick="copyText()">📋 Copiar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const MAX_FILE_SIZE = 10 * 1024 * 1024;
        const ALLOWED_EXTENSIONS = ['pdf', 'png', 'jpg', 'jpeg', 'gif', 'bmp', 'tiff', 'webp'];
        let isProcessing = false;

        const fileInput = document.getElementById('fileInput');
        const dropArea = document.getElementById('drop-area');

        // Prevent defaults
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, e => { e.preventDefault(); e.stopPropagation(); }, false);
        });

        // Drop handler
        dropArea.addEventListener('drop', e => handleFiles(e.dataTransfer.files), false);
        fileInput.addEventListener('change', e => handleFiles(e.target.files), false);

        function handleFiles(files) {
            if (!files || files.length === 0) return;
            
            const file = files[0];
            const ext = file.name.split('.').pop().toLowerCase();
            
            console.log('Arquivo:', file.name, 'Tamanho:', file.size);
            
            if (!ALLOWED_EXTENSIONS.includes(ext)) {
                showToast('Formato inválido', 'error');
                return;
            }
            
            if (file.size > MAX_FILE_SIZE) {
                showToast('Arquivo muito grande (máx 10MB)', 'error');
                return;
            }
            
            uploadFile(file);
        }

        function uploadFile(file) {
            if (isProcessing) {
                showToast('Aguarde o processamento atual', 'error');
                return;
            }
            
            console.log('Iniciando upload...');
            isProcessing = true;
            showLoading('Processando...');
            
            const formData = new FormData();
            formData.append('file', file);
            
            fetch('/processar', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                console.log('Status:', response.status);
                if (!response.ok) {
                    return response.json().then(data => {
                        throw new Error(data.erro || 'Erro ao processar');
                    });
                }
                return response.json();
            })
            .then(data => {
                console.log('Sucesso:', data);
                showResult(data);
                showToast('Processado com sucesso!', 'success');
            })
            .catch(error => {
                console.error('Erro:', error);
                showToast(error.message, 'error');
            })
            .finally(() => {
                isProcessing = false;
                hideLoading();
            });
        }

        function processManualText() {
            const text = document.getElementById('manualText').value.trim();
            
            if (!text || text.length < 20) {
                showToast('Texto muito curto (mín 20 caracteres)', 'error');
                return;
            }
            
            if (isProcessing) return;
            
            isProcessing = true;
            showLoading('Processando texto...');
            
            fetch('/processar_texto', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ texto: text })
            })
            .then(response => {
                if (!response.ok) throw new Error('Erro ao processar');
                return response.json();
            })
            .then(data => {
                showResult(data);
                showToast('Processado!', 'success');
            })
            .catch(error => {
                showToast(error.message, 'error');
            })
            .finally(() => {
                isProcessing = false;
                hideLoading();
            });
        }

        function showResult(data) {
            document.getElementById('simplifiedText').innerHTML = data.texto.replace(/\n/g, '<br>');
            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
        }

        function copyText() {
            const text = document.getElementById('simplifiedText').textContent;
            navigator.clipboard.writeText(text).then(() => {
                showToast('Texto copiado!', 'success');
            });
        }

        function clearAll() {
            document.getElementById('manualText').value = '';
            document.getElementById('resultSection').style.display = 'none';
            fileInput.value = '';
        }

        function showLoading(text) {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loadingOverlay').classList.add('show');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('show');
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        console.log('✅ JavaScript carregado corretamente');
    </script>
</body>
</html>
